name: Run Python Script Daily

on:
  schedule:
    - cron: '15 4 * * *'  # Runs at 4:15 AM UTC (5:15 AM BST) to beat the top-of-the-hour queue spikes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository content
      uses: actions/checkout@v4  # Upgraded to v4 for faster execution

    - name: Set up Python
      uses: actions/setup-python@v5  # Upgraded to v5 for better caching and speed
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas

    - name: Run Python script
      run: python weather.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add processed_weather_data.json
        git commit -m 'Update daily forecast data'
        git push
